<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Acceso Administrador</title>
<link rel="icon" type="image/png" href="assets/images/logotulum.png">

<style>

body{
font-family: Arial;
background:#1f2d3d;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#2c3e50;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#27ae60;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2ecc71;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Administrador Jardin Botanico Tulum</h2>

<input id="usuario" placeholder="Usuario">

<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p>
<a href="recuperar.html">¿Olvidaste tu contraseña?</a>
</p>


<p id="error"></p>

</div>

<script src="js/login.js"></script>

</body>

</html>
